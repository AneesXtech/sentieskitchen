<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition Details | CN Physiotherapy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { overflow-y: auto; }
        .detail-container {
            max-width: 900px;
            margin: 120px auto 60px;
            padding: 0 2rem;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .content-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
        }
        .breadcrumb { margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.9rem; }
        .breadcrumb a { color: var(--accent-color); text-decoration: none; }
        h1 { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 3rem; }
        .treatments ul { list-style: none; margin-top: 1rem; }
        .treatments li { 
            padding: 1rem; 
            margin-bottom: 1rem; 
            background: rgba(255,255,255,0.03); 
            border-radius: 12px;
            display: flex;
            align-items: center;
        }
        .treatments li::before { content: "→"; color: var(--accent-color); margin-right: 1rem; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="logo">CN <span>Physiotherapy</span></div>
        <nav>
            <a href="index.html">Body Map</a>
            <a href="#">What We Treat</a>
            <a href="#">How We Treat</a>
        </nav>
    </header>

    <div class="detail-container">
        <div class="breadcrumb">
            <a href="index.html">Home</a> / <span id="bread-region">Region</span>
        </div>

        <div class="content-card">
            <h1 id="main-title">Condition Recovery</h1>
            <p id="main-desc" style="font-size: 1.2rem; color: var(--text-secondary); line-height: 1.8;">
                Loading clinical information...
            </p>

            <div class="grid">
                <div class="conditions">
                    <h3 style="color: var(--accent-color); margin-bottom: 1rem;">Common Conditions</h3>
                    <div id="cond-list">
                        <!-- Populated by script -->
                    </div>
                </div>
                <div class="treatments">
                    <h3 style="color: var(--accent-color); margin-bottom: 1rem;">How We Treat It</h3>
                    <ul id="treat-list">
                        <!-- Populated by script -->
                    </ul>
                </div>
            </div>

            <div style="margin-top: 4rem; text-align: center;">
                <a href="#" class="btn" style="padding: 1rem 3rem;">Book an Appointment</a>
            </div>
        </div>
    </div>

    <script>
        const contentData = {
            'head-and-neck': {
                title: 'Head and Neck Conditions',
                desc: 'Our specialized therapists focus on relieving complex neck pain, recurring headaches, and jaw dysfunction using advanced manual therapy and corrective exercises.',
                conditions: ['TMJ Dysfunction', 'Tension Headaches', 'Spinous Headaches', 'Cervical Radiculopathy'],
                treatments: ['Manual Therapy', 'Acupuncture', 'McKenzie Method', 'Vestibular Therapy']
            },
            'back': {
                title: 'Back Pain & Sciatica Relief',
                desc: 'Back pain is one of the most common reasons for activity limitation. We use evidence-based protocols to restore mobility and eliminate neural pain.',
                conditions: ['Sciatica', 'Herniated Discs', 'Lumbar Strain', 'Spondylolisthesis'],
                treatments: ['McKenzie Method', 'Shockwave Therapy', 'Manual Therapy', 'Dry Needling']
            },
            'shoulder': {
                title: 'Shoulder Pain Recovery',
                desc: 'Whether it is an sports injury or age-related stiffness, we provide comprehensive rehab for rotator cuffs and frozen shoulders.',
                conditions: ['Rotator Cuff Tears', 'Frozen Shoulder', 'Bursitis', 'Impingement Syndrome'],
                treatments: ['Shockwave', 'Manual Therapy', 'Therapeutic Exercise', 'Kinesio Taping']
            },
            'upper-extremity': {
                title: 'Elbow, Wrist, & Hand Recovery',
                desc: 'From Carpal Tunnel to Tennis Elbow, our therapists use precision manual therapy and customized bracing advice to restore your grip and arm function.',
                conditions: ['Carpal Tunnel Syndrome', 'Tennis Elbow', 'Golfer\'s Elbow', 'Trigger Finger'],
                treatments: ['IASTM', 'Manual Therapy', 'Kinesio Taping', 'Custom Orthotics']
            }
            // Add more as needed
        };

        const params = new URLSearchParams(window.location.search);
        const region = params.get('region') || 'head-and-neck';
        const data = contentData[region] || contentData['head-and-neck'];

        document.getElementById('bread-region').innerText = data.title;
        document.getElementById('main-title').innerText = data.title;
        document.getElementById('main-desc').innerText = data.desc;

        const condList = document.getElementById('cond-list');
        data.conditions.forEach(c => {
            const el = document.createElement('p');
            el.style.marginBottom = '0.5rem';
            el.innerText = c;
            condList.appendChild(el);
        });

        const treatList = document.getElementById('treat-list');
        data.treatments.forEach(t => {
            const el = document.createElement('li');
            el.innerText = t;
            treatList.appendChild(el);
        });
    </script>
</body>
</html>
